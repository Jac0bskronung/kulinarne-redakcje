<body class="bg-surface text-on-surface font-body">

<!-- ══════════ HEADER ══════════ -->
<header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-md shadow-sm h-16 flex items-center justify-between px-4 md:px-8">
  <div class="flex items-center gap-2">
    <span class="material-symbols-outlined text-primary text-2xl icon-fill">skillet</span>
    <h1 class="text-xl font-extrabold tracking-tight text-primary font-headline">Kulinarne Redakcje</h1>
  </div>
  <div class="flex items-center gap-3">
    <!-- Connection status -->
    <div class="flex items-center gap-1.5">
      <div id="conn-dot" class="w-2 h-2 rounded-full bg-[#aeadaa] pulse"></div>
      <span id="conn-label" class="text-[10px] text-on-surface-variant hidden md:block">Łączenie…</span>
    </div>
    <!-- User badge -->
    <div id="user-badge" class="bg-primary/10 text-primary text-xs font-bold px-3 py-1 rounded-full font-headline cursor-pointer hover:bg-primary/20 transition-colors"
      onclick="openProfileModal()">
      <span id="user-badge-name">Gość</span>
    </div>
  </div>
</header>

<!-- ══════════ TABS ══════════ -->
<div class="fixed top-16 w-full z-40 bg-surface/90 backdrop-blur-sm border-b border-outline-variant/20 flex px-4 md:px-8">
  <button id="tab-btn-planer" class="tab-btn active rounded-none font-headline font-bold text-sm px-5 py-3 border-b-2 border-primary"
    onclick="switchTab('planer')">
    <span class="material-symbols-outlined text-[16px] align-middle mr-1">calendar_view_week</span>Planer
  </button>
  <button id="tab-btn-dieta" class="tab-btn rounded-none font-headline font-bold text-sm px-5 py-3 border-b-2 border-transparent"
    onclick="switchTab('dieta')">
    <span class="material-symbols-outlined text-[16px] align-middle mr-1">monitor_weight</span>Dieta
  </button>
</div>

<!-- ══════════ MAIN ══════════ -->
<main class="pt-[7.5rem] pb-28 px-3 md:px-8 max-w-[1400px] mx-auto">

  <!-- ─── TAB: PLANER ─── -->
  <div id="tab-planer">

    <!-- Calorie summary -->
    <section class="mb-5 p-4 md:p-6 bg-surface-container rounded-3xl">
      <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div>
          <h2 class="font-headline font-bold text-base text-on-surface-variant">Podsumowanie tygodniowe</h2>
          <p class="text-xs text-on-surface-variant mt-0.5">
            Plan wspólny · Tydzień łącznie: <span class="font-bold text-on-surface" id="sum-week">0</span> kcal
          </p>
        </div>
        <div class="flex gap-2 md:gap-3 overflow-x-auto hide-scrollbar" id="calorie-bubbles"></div>
      </div>
    </section>

    <!-- Day tabs (mobile) -->
    <div class="md:hidden flex gap-2 overflow-x-auto hide-scrollbar mb-4" id="day-tabs"></div>

    <!-- Loading overlay -->
    <div id="plan-loading" class="flex items-center justify-center py-16 text-on-surface-variant">
      <span class="material-symbols-outlined animate-spin mr-2">refresh</span>
      <span class="text-sm">Ładowanie planu…</span>
    </div>

    <!-- Meal grid -->
    <div id="grid-wrapper" class="mb-8 hidden"></div>

    <!-- Shopping button -->
    <div class="flex justify-center mb-8">
      <button onclick="toggleShopping()"
        class="bg-gradient-to-r from-primary to-primary-dim text-on-primary font-bold py-3.5 px-8 rounded-full shadow-lg shadow-primary/20 flex items-center gap-2 hover:scale-105 active:scale-95 transition-all">
        <span class="material-symbols-outlined">shopping_cart_checkout</span>
        Generuj listę zakupów
      </button>
    </div>

    <!-- Shopping list -->
    <section id="shopping-section" class="hidden bg-surface-container-low rounded-3xl p-5 md:p-8">
      <div class="flex items-center justify-between mb-5">
        <h2 class="font-headline font-bold text-xl">Lista zakupów</h2>
        <div class="flex items-center gap-3">
          <span class="text-xs text-on-surface-variant" id="shop-count"></span>
          <button onclick="clearChecked()" class="text-primary text-sm font-bold hover:underline">Wyczyść zaznaczone</button>
        </div>
      </div>
      <div id="shop-content" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    </section>
  </div>

  <!-- ─── TAB: DIETA ─── -->
  <div id="tab-dieta" class="hidden space-y-5">

    <!-- Personal profile card -->
    <div class="bg-surface-container rounded-3xl p-5 md:p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-headline font-bold text-lg">Mój profil</h2>
        <button onclick="openProfileModal()" class="text-primary text-sm font-bold flex items-center gap-1 hover:underline">
          <span class="material-symbols-outlined text-[16px]">edit</span>Edytuj
        </button>
      </div>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3" id="profile-cards"></div>
    </div>

    <!-- Daily breakdown this week -->
    <div class="bg-surface-container-low rounded-3xl p-5 md:p-6">
      <h2 class="font-headline font-bold text-lg mb-4">Ten tydzień</h2>
      <div id="dieta-week" class="space-y-3"></div>
    </div>

    <!-- Today's detail -->
    <div class="bg-surface-container-low rounded-3xl p-5 md:p-6">
      <h2 class="font-headline font-bold text-lg mb-4" id="dieta-today-title">Dzisiaj</h2>
      <div id="dieta-today" class="space-y-3"></div>
    </div>

  </div>

</main>

<!-- ══════════ BOTTOM NAV ══════════ -->
<nav class="fixed bottom-0 left-0 w-full bg-surface/80 backdrop-blur-md rounded-t-3xl z-50 flex justify-around items-center px-4 pb-6 pt-3 shadow-[0_-8px_24px_rgba(0,0,0,0.06)]">
  <button onclick="switchTab('planer')" id="nav-planer" class="flex flex-col items-center gap-0.5 bg-primary/10 text-primary rounded-2xl px-5 py-1.5">
    <span class="material-symbols-outlined">calendar_view_week</span>
    <span class="text-[11px] font-medium">Planer</span>
  </button>

    <span class="text-[11px] font-medium">Lista</span>
  </button>

    <span class="material-symbols-outlined">monitor_weight</span>
    <span class="text-[11px] font-medium">Dieta</span>
  </button>
  <button onclick="resetWeek()" class="flex flex-col items-center gap-0.5 text-on-surface-variant hover:text-primary transition-colors px-5 py-1.5">
    <span class="material-symbols-outlined">restart_alt</span>
    <span class="text-[11px] font-medium">Reset</span>
  </button>
</nav>

<!-- ══════════ RECIPE MODAL ══════════ -->
<div id="modal-overlay" class="fixed inset-0 z-[100] hidden items-end md:items-center justify-center"
  style="background:rgba(0,0,0,0.4);opacity:0" onclick="handleOverlay(event)">
  <div id="modal-panel" onclick="event.stopPropagation()"
    class="bg-surface w-full md:max-w-lg md:rounded-3xl rounded-t-3xl p-5 max-h-[82vh] flex flex-col shadow-2xl">
    <div class="flex items-center justify-between mb-3">
      <h3 class="font-headline font-bold text-lg" id="modal-title">Wybierz posiłek</h3>
      <button onclick="closeModal()" class="material-symbols-outlined text-on-surface-variant hover:text-on-surface">close</button>
    </div>
    <div class="relative mb-3">
      <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[18px]">search</span>
      <input id="modal-search" type="text" placeholder="Szukaj przepisu…"
        class="w-full pl-9 pr-4 py-2.5 bg-surface-container rounded-xl text-sm outline-none border border-outline-variant/30 focus:border-primary"
        oninput="filterModal()"/>
    </div>
    <div class="flex gap-2 mb-3 overflow-x-auto hide-scrollbar">
      <button class="chip active" onclick="setChip('all',this)">Wszystkie</button>
      <button class="chip" onclick="setChip('polska',this)">Polska</button>
      <button class="chip" onclick="setChip('azjatycka',this)">Azjatycka</button>
      <button class="chip" onclick="setChip('wegetariańska',this)">Wegetariańska</button>
      <button class="chip" onclick="setChip('bezglutenowa',this)">Bezglutenowa</button>
    </div>
    <div class="overflow-y-auto flex-1 space-y-1.5" id="modal-list"></div>
  </div>
</div>

<!-- ══════════ PROFILE MODAL ══════════ -->
<div id="profile-overlay" class="fixed inset-0 z-[100] hidden items-center justify-center"
  style="background:rgba(0,0,0,0.4)" onclick="closeProfileModal()">

    class="bg-surface w-full max-w-sm mx-4 rounded-3xl p-6 shadow-2xl">
    <div class="flex items-center justify-between mb-5">
      <h3 class="font-headline font-bold text-lg">Mój profil</h3>
      <button onclick="closeProfileModal()" class="material-symbols-outlined text-on-surface-variant">close</button>
    </div>
    <div class="space-y-4">
      <div>
        <label class="text-xs font-bold text-on-surface-variant uppercase tracking-wide block mb-1">Imię</label>
        <input id="p-name" type="text" placeholder="np. Kuba"
          class="w-full px-4 py-2.5 bg-surface-container rounded-xl text-sm outline-none border border-outline-variant/30 focus:border-primary"/>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-xs font-bold text-on-surface-variant uppercase tracking-wide block mb-1">Waga (kg)</label>
          <input id="p-weight" type="number" placeholder="96"
            class="w-full px-4 py-2.5 bg-surface-container rounded-xl text-sm outline-none border border-outline-variant/30 focus:border-primary"/>
        </div>
        <div>
          <label class="text-xs font-bold text-on-surface-variant uppercase tracking-wide block mb-1">Cel (kg)</label>
          <input id="p-goal" type="number" placeholder="80"
            class="w-full px-4 py-2.5 bg-surface-container rounded-xl text-sm outline-none border border-outline-variant/30 focus:border-primary"/>
        </div>
      </div>
      <div>
        <label class="text-xs font-bold text-on-surface-variant uppercase tracking-wide block mb-1">Cel kaloryczny (kcal/dzień)</label>
        <input id="p-kcal" type="number" placeholder="2140"
          class="w-full px-4 py-2.5 bg-surface-container rounded-xl text-sm outline-none border border-outline-variant/30 focus:border-primary"/>
        <p class="text-[10px] text-outline mt-1">Zostaw puste — obliczę automatycznie z wagi i celu</p>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-xs font-bold text-on-surface-variant uppercase tracking-wide block mb-1">Wiek</label>
          <input id="p-age" type="number" placeholder="26"
            class="w-full px-4 py-2.5 bg-surface-container rounded-xl text-sm outline-none border border-outline-variant/30 focus:border-primary"/>
        </div>
        <div>
          <label class="text-xs font-bold text-on-surface-variant uppercase tracking-wide block mb-1">Wzrost (cm)</label>
          <input id="p-height" type="number" placeholder="179"
            class="w-full px-4 py-2.5 bg-surface-container rounded-xl text-sm outline-none border border-outline-variant/30 focus:border-primary"/>
        </div>
      </div>
      <button onclick="saveProfile()"
        class="w-full bg-primary text-on-primary font-bold py-3 rounded-xl hover:bg-primary-dim transition-colors">
        Zapisz profil
      </button>
    </div>
  </div>
</div>

const PROFILE_KEY = "kr_profile_v2";
const CHECK_KEY   = "kr_checked_v2";

let plan     = {};

function safeLoad(k,d){try{return JSON.parse(localStorage.getItem(k))||d}catch{return d}}
function localSave(k,v){localStorage.setItem(k,JSON.stringify(v))}
function todayIndex(){const d=new Date().getDay();return d===0?6:d-1}
function weekDates(){
  const today=new Date(), d=today.getDay(), diff=d===0?-6:1-d, mon=new Date(today);
  mon.setDate(today.getDate()+diff);
  return Array.from({length:7},(_,i)=>{const dt=new Date(mon);dt.setDate(mon.getDate()+i);return dt});
}
function fmtDate(d){return `${d.getDate()} ${CFG.months[d.getMonth()]}`}
function getRecipe(id){return RECIPES.find(r=>r.id===id)||null}
function dayKcal(di){
  const dp=plan[di]||{};
  return CFG.slots.reduce((s,sl)=>{const r=getRecipe(dp[sl.id]);return s+(r?r.kcal_per_serving:0)},0);
}

// ── Calorie target from profile ──
function profileKcal(){
  if(profile.kcal) return profile.kcal;
  if(profile.weight && profile.age && profile.height){
    // Mifflin-St Jeor (male default) + lightly active - deficit for loss
    const bmr = 10*profile.weight + 6.25*profile.height - 5*profile.age + 5;
    const tdee = Math.round(bmr * 1.375);
    return Math.max(1200, tdee - 550);
  }
  return 2140;
}

// ════════════════════════════════════════
//  SUPABASE: LOAD + REALTIME
// ════════════════════════════════════════
async function initSupabase(){
  setConn("loading");
  try {
    // 1. Pobierz przepisy z bazy
    const {data: recipesData, error: recipesError} = await db.from("recipes").select("slug,title,emoji,cuisine,rating,prep_time,kcal_per_serving,grams_per_serving,servings,diet,url,ingredients").not("slug","is",null);
    if(recipesError) throw recipesError;
    if(recipesData && recipesData.length > 0){
      RECIPES = recipesData.map(r => ({
        id: r.slug,
        title: r.title,
        emoji: r.emoji||"🍽️",
        cuisine: r.cuisine||"",
        rating: parseFloat(r.rating)||0,
        prep_time: parseInt(r.prep_time)||0,
        kcal_per_serving: r.kcal_per_serving||0,
        grams_per_serving: r.grams_per_serving||0,
        servings: parseInt(r.servings)||1,
        diet: r.diet||[],
        url: r.url||"",
        ingredients: r.ingredients||[],
      }));
    } else {
      RECIPES = RECIPES_SEED;
    }

    // 2. Pobierz plan tygodnia
    const {data, error} = await db.from("meal_plan").select("*");
    if(error) throw error;
    plan = {};
    (data||[]).forEach(row => {
      if(!plan[row.day_index]) plan[row.day_index]={};
      plan[row.day_index][row.slot] = row.recipe_id;
    });
    setConn("ok");
    document.getElementById("plan-loading").classList.add("hidden");
    document.getElementById("grid-wrapper").classList.remove("hidden");
    render();
  } catch(e) {
    console.error(e);
    setConn("err");
    document.getElementById("plan-loading").innerHTML =
      `<span class="text-sm text-primary">Błąd połączenia. Sprawdź internet.</span>`;
  }

  // Real-time subscription
  db.channel("meal_plan_rt")
    .on("postgres_changes",{event:"*",schema:"public",table:"meal_plan"},(payload)=>{
      const {eventType, new:row, old} = payload;
      if(eventType==="DELETE"){
        if(plan[old.day_index]) plan[old.day_index][old.slot]=null;
      } else {
        if(!plan[row.day_index]) plan[row.day_index]={};
        plan[row.day_index][row.slot] = row.recipe_id;
      }
      render();
    })
    .subscribe(status=>{
      if(status==="SUBSCRIBED") setConn("ok");
      else if(status==="CHANNEL_ERROR"||status==="TIMED_OUT") setConn("err");
    });
}

async function upsertMeal(di, slotId, recipeId){
  // Optimistic update
  if(!plan[di]) plan[di]={};
  plan[di][slotId] = recipeId;
  render();
  // Sync to DB
  if(recipeId){
    await db.from("meal_plan").upsert(
      {day_index:di, slot:slotId, recipe_id:recipeId, updated_at:new Date().toISOString()},
      {onConflict:"day_index,slot"}
    );
  } else {
    await db.from("meal_plan").delete().eq("day_index",di).eq("slot",slotId);
  }
}

function setConn(state){
  const dot  = document.getElementById("conn-dot");
  const lbl  = document.getElementById("conn-label");
  if(state==="ok"){
    dot.className="w-2 h-2 rounded-full bg-secondary"; lbl.textContent="Online";
  } else if(state==="err"){
    dot.className="w-2 h-2 rounded-full bg-primary pulse"; lbl.textContent="Offline";
  } else {
    dot.className="w-2 h-2 rounded-full bg-[#aeadaa] pulse"; lbl.textContent="Łączenie…";
  }
}

    const tags=r.diet.map(d=>`<span class="bg-secondary-container text-on-secondary-container text-[9px] font-bold px-1.5 py-0.5 rounded-full">${d}</span>`).join("");
    return `<button onclick="pickRecipe('${r.id}')" class="w-full flex items-center gap-3 p-2.5 rounded-xl text-left transition-colors hover:bg-primary/5 ${sel?"bg-primary/10 ring-2 ring-primary/30":""}">
      <span class="w-10 h-10 rounded-xl bg-surface-container flex items-center justify-center text-xl flex-shrink-0">${r.emoji}</span>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-1 flex-wrap">
          <span class="text-sm font-semibold text-on-surface leading-tight">${r.title}</span>
          ${sel?'<span class="material-symbols-outlined text-primary text-[14px]">check_circle</span>':""}
        </div>
        <div class="flex items-center gap-1.5 mt-0.5 flex-wrap">
          <span class="text-[11px] font-bold ${kc}">${r.kcal_per_serving} kcal · ${r.grams_per_serving} g</span>
          <span class="text-[10px] text-outline">· ⏱ ${r.prep_time} min · ⭐ ${r.rating}</span>
          ${tags}
        </div>
      </div>
      <a href="${r.url}" target="_blank" onclick="event.stopPropagation()"
        class="material-symbols-outlined text-[16px] text-outline hover:text-primary flex-shrink-0">open_in_new</a>
    </button>`;
  }).join("");
  document.getElementById("modal-list").innerHTML=html;
}

function pickRecipe(id){
  upsertMeal(mDay, mSlot, id);
  closeModal();
}
function setChip(f,btn){
  mFilter=f;document.querySelectorAll(".chip").forEach(b=>b.classList.remove("active"));btn.classList.add("active");renderModalList();
}
function filterModal(){mSearch=document.getElementById("modal-search").value;renderModalList()}

// ════════════════════════════════════════
//  MODAL — PROFILE
// ════════════════════════════════════════
function openProfileModal(){
  document.getElementById("p-name").value   = profile.name||"";
  document.getElementById("p-weight").value = profile.weight||"";
  document.getElementById("p-goal").value   = profile.goalWeight||"";
  document.getElementById("p-kcal").value   = profile.kcal||"";
  document.getElementById("p-age").value    = profile.age||"";
  document.getElementById("p-height").value = profile.height||"";
  document.getElementById("profile-overlay").classList.remove("hidden");
  document.getElementById("profile-overlay").classList.add("flex");
  document.body.style.overflow="hidden";
}
function closeProfileModal(){
  document.getElementById("profile-overlay").classList.add("hidden");
  document.getElementById("profile-overlay").classList.remove("flex");
  document.body.style.overflow="";
}
function saveProfile(){
  profile = {
    name:       document.getElementById("p-name").value.trim()||"",
    weight:     parseFloat(document.getElementById("p-weight").value)||null,
    goalWeight: parseFloat(document.getElementById("p-goal").value)||null,
    kcal:       parseInt(document.getElementById("p-kcal").value)||null,
    age:        parseInt(document.getElementById("p-age").value)||null,
    height:     parseInt(document.getElementById("p-height").value)||null,
  };
  localSave(PROFILE_KEY, profile);
  closeProfileModal();
  render();
}

// ════════════════════════════════════════
//  SHOPPING LIST
// ════════════════════════════════════════
function toggleShopping(){
  shopOpen=!shopOpen;
  const sec=document.getElementById("shopping-section");
  if(shopOpen){sec.classList.remove("hidden");renderShopping();setTimeout(()=>sec.scrollIntoView({behavior:"smooth",block:"start"}),50)}
  else sec.classList.add("hidden");
}
function renderShopping(){
  const ids=new Set();
  for(let d=0;d<7;d++){const dp=plan[d]||{};CFG.slots.forEach(sl=>{if(dp[sl.id])ids.add(dp[sl.id])})}
  document.getElementById("shop-count").textContent = ids.size===0?"Brak zaplanowanych posiłków":`${ids.size} ${ids.size===1?"przepis":ids.size<5?"przepisy":"przepisów"}`;
  if(!ids.size){
    document.getElementById("shop-content").innerHTML=`<div class="col-span-2 text-center py-10 text-on-surface-variant"><span class="material-symbols-outlined text-5xl block mb-3 opacity-40">shopping_basket</span><p class="text-sm">Najpierw zaplanuj posiłki na tydzień</p></div>`;
    return;
  }
  const CATS=[
    {id:"mieso",    label:"Mięso i ryby",           icon:"🥩",cls:"text-primary"},
    {id:"warzywa",  label:"Warzywa i owoce",         icon:"🥦",cls:"text-secondary"},
    {id:"nabial",   label:"Nabiał",                  icon:"🥛",cls:"text-[#805100]"},
    {id:"suche",    label:"Produkty suche i puszki", icon:"🫙",cls:"text-on-surface-variant"},
    {id:"przyprawy",label:"Przyprawy i oleje",       icon:"🫒",cls:"text-outline"},
  ];
  const grouped=Object.fromEntries(CATS.map(c=>[c.id,[]]));
  ids.forEach(id=>{
    const r=getRecipe(id);if(!r)return;
    r.ingredients.forEach(ing=>{
      const cat=ing.cat in grouped?ing.cat:"suche";
      grouped[cat].push({name:ing.name,amount:ing.amount,recipe:r.title,key:`${id}__${ing.name}`});
    });
  });
  document.getElementById("shop-content").innerHTML=CATS.filter(c=>grouped[c.id].length).map(c=>`
    <div>
      <h3 class="${c.cls} font-bold text-xs uppercase tracking-widest mb-3 flex items-center gap-1.5">${c.icon} ${c.label}</h3>
      <ul class="space-y-2">
        ${grouped[c.id].map(item=>{
          const done=checked[item.key];
          return `<li onclick="toggleItem('${item.key}')" class="flex items-center justify-between p-2.5 bg-surface-container-lowest rounded-xl cursor-pointer hover:bg-primary/5 transition-colors select-none">
            <div class="flex items-center gap-2.5 min-w-0">
              <div class="w-5 h-5 rounded flex-shrink-0 border-2 flex items-center justify-center transition-all ${done?"bg-primary border-primary":"border-[#aeadaa]"}">
                ${done?'<span class="material-symbols-outlined text-[12px] text-on-primary" style="font-variation-settings:\'FILL\' 1">check</span>':""}
              </div>
              <div class="min-w-0">
                <span class="text-sm font-medium block ${done?"line-through text-outline":"text-on-surface"}">${item.name}</span>
                <span class="text-[9px] text-outline truncate block">${item.recipe}</span>
              </div>
            </div>
            <span class="text-[11px] text-on-surface-variant bg-surface-container px-2 py-0.5 rounded-full flex-shrink-0 ml-2">${item.amount}</span>
          </li>`;
        }).join("")}
      </ul>
    </div>`).join("");
}
function toggleItem(key){checked[key]=!checked[key];localSave(CHECK_KEY,checked);renderShopping()}
function clearChecked(){checked={};localSave(CHECK_KEY,checked);renderShopping()}

// ════════════════════════════════════════
//  INIT
// ════════════════════════════════════════
initSupabase();
</script>
